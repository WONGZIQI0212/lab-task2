<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Task Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER: app title + live task counter badge + priority filter dropdown -->
  <header>
    <h1>My Task Board</h1>

    <!-- Badge: JS will update this number whenever tasks are added/removed -->
    <span id="task-count">0 tasks</span>

    <!-- Filter: changing this triggers JS to show/hide cards by priority -->
    <select id="priority-filter">
      <option value="all">All Priorities</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
  </header>

  <!-- BOARD: three-column kanban layout -->
  <main id="board">

    <!-- TO DO column -->
    <section id="todo">
      <h2>To Do</h2>
      <ul class="task-list"></ul> <!-- JS appends task cards here -->
      <!-- class: to identify which button was clicked / data-column: to know where to insert new card -->
      <button class="add-task-btn" data-column="todo">+ Add Task</button>
    </section>

    <!-- IN PROGRESS column -->
    <section id="inprogress">
      <h2>In Progress</h2>
      <ul class="task-list"></ul>
      <button class="add-task-btn" data-column="inprogress">+ Add Task</button>
    </section>

    <!-- DONE column -->
    <section id="done">
      <h2>Done</h2>
      <ul class="task-list"></ul>
      <button class="add-task-btn" data-column="done">+ Add Task</button>
      <!-- Clear All: JS removes every card -->
      <button id="clear-done-btn">Clear All</button>
    </section>

  </main>

<!-- MODAL: hidden by default — shown when adding or editing a task -->
  <div id="modal" class="hidden">
    <div id="modal-content">
      <h2 id="modal-heading">Add Task</h2>

      <label>Title</label>
      <!-- Text input: task title -->
      <input type="text" id="task-title" placeholder="Task title" />

      <label>Description</label>
      <!-- Textarea: task description -->
      <textarea id="task-desc" placeholder="Details..."></textarea>

      <label>Priority</label>
      <!-- Select: task priority -->
      <select id="task-priority">
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>

      <label>Due Date</label>
      <!-- Date picker: due date -->
      <input type="date" id="task-due" />

      <div id="modal-actions">
        <!-- Save: all inputs and calls addTask or updateTask -->
        <button id="save-btn">Save</button>
        <!-- Cancel: hides the modal without saving -->
        <button id="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Load JS last so all DOM elements above are ready when script runs -->
  <script src="taskmanager.js"></script>

</body>
</html>
